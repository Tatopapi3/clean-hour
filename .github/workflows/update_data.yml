name: Update CA Grid Data

on:
  schedule:
    - cron: '0 * * * *'   # every hour at :00
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch EIA data
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python fetch_data.py --region CAL

      - name: Run analysis
        run: python analyze.py --region CAL

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cal_hourly.json data/cal_insight.json
          git diff --cached --quiet || git commit -m "chore: update CAL grid data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
