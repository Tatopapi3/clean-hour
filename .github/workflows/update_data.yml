name: Update Grid Data (all regions)

on:
  schedule:
    - cron: '0 * * * *'   # every hour at :00
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch EIA carbon data (all regions)
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: |
          python fetch_data.py --region CAL
          python fetch_data.py --region TEX
          python fetch_data.py --region NYIS

      - name: Fetch real-time price data (all regions)
        run: |
          python fetch_price.py --region CAL
          python fetch_price.py --region TEX
          python fetch_price.py --region NYIS

      - name: Run analysis (all regions)
        run: |
          python analyze.py --region CAL
          python analyze.py --region TEX
          python analyze.py --region NYIS

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update grid data for all regions $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
